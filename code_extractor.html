<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Code Extractor - Tiles</title>
  <style>
    :root{--bg:#fff;--muted:#666;--accent:#4CAF50;--tile:#f9f9f9}
    html,body{height:100%;margin:0;background:var(--bg);font-family:Inter,Arial,Helvetica,sans-serif;color:#111}
    .wrap{max-width:1100px;margin:8px auto;padding:6px}
    header{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    h1{font-size:14px;margin:0}
    #search{flex:1;padding:6px 8px;font-size:13px;border:1px solid #ccc;border-radius:4px}
    #container{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
    .tile{background:var(--tile);border:1px solid #e6e6e6;border-radius:6px;overflow:hidden;display:flex;flex-direction:column}
    .tile-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f3f3f3;border-bottom:1px solid #e8e8e8}
    .tile-title{font-size:13px;font-weight:600;color:#222}
    .tile-actions{display:flex;gap:6px;align-items:center}
    .btn{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:5px;font-weight:700;cursor:pointer}
    .btn.small{padding:6px 8px;font-size:12px}
    .btn:active{transform:translateY(1px)}
    .tile-body{padding:8px;display:none;flex-direction:column;gap:8px}
    .tile-body.open{display:flex}
    .cell{background:#fff;border:1px solid #eee;border-radius:4px;overflow:hidden}
    .cell-head{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#fafafa;border-bottom:1px solid #eee;font-size:12px}
    .cell-pre{margin:0;padding:8px;font-family:monospace;font-size:12px;line-height:1.2;max-height:160px;overflow:auto;background:#fff}
    .copied-badge{background:#2196F3;color:#fff;padding:4px 6px;border-radius:4px;font-size:12px}
    @media (max-width:420px){#container{grid-template-columns:repeat(1,1fr)} .btn{padding:6px 8px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Code Extractor</h1>
      <input id="search" placeholder="Search code...">
    </header>

    <main id="container" aria-live="polite"></main>
  </div>

  <script>
    // Notebook data (extracted from your notebooks)
    const NOTEBOOKS = {"Exp2 Simple Responsible AI concept": ["\n#Responsible AI=Fairness+Transparency+Safety\n# Install libraries\n!pip install transformers torch\n\n# Import pipeline\nfrom transformers import pipeline\n\n# Load BERT model\nunmasker = pipeline(\"fill-mask\", model=\"bert-base-uncased\")\n\n# Test sentences\nsentences = [\n    \"The doctor said that [MASK].\",\n    \"The nurse said that [MASK].\"\n]\n\n# Check predictions\nfor s in sentences:\n\n    print(\"\\nSentence:\", s)\n\n    result = unmasker(s)\n\n    # Print top prediction\n    print(\"Prediction:\", result[0]['token_str'])\n", "Check whether AI gives equal results for different groups.", "from transformers import pipeline\n\n# Load sentiment model\nclassifier = pipeline(\"sentiment-analysis\")\n\n# Similar sentences\nsentences = [\n    \"The man is intelligent.\",\n    \"The woman is intelligent.\"\n]\n\n# Check outputs\nfor s in sentences:\n    print(s, \"->\", classifier(s))"], "exp 3 arithmetic operations using Tensorflow or PyTorch": ["# Import PyTorch\nimport torch\n\n# Create tensors\na = torch.tensor([[1, 2],\n                  [3, 4]])\n\nb = torch.tensor([[5, 6],\n                  [7, 8]])\n\nprint(\"Tensor A:\\n\", a)\nprint(\"Tensor B:\\n\", b)\nprint(\"\\nAddition:\\n\", a + b)\nprint(\"\\nSubtraction:\\n\", a - b)\nprint(\"\\nMultiplication:\\n\", a * b)\nprint(\"\\nScalar Multiplication:\\n\", a * 2)\nprint(\"\\nMatrix Multiplication:\\n\", torch.matmul(a, b))"], "exp 6 no prompt t5 summarisation": ["# Install library\n!pip install transformers\n\n# Import model components\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\n# Load FLAN-T5 model and tokenizer\nmodel_name = \"google/flan-t5-small\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\nmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name)\n\n# Dialogue\ntext = \"\"\"\nRam: Hello\nShyam: Hi\nRam: Let's go to college\n\"\"\"\n\n# Prepare input for summarization with an explicit prompt\ninput_text = \"summarize: \" + text\n\n# Tokenize the input\ninput_ids = tokenizer(input_text, return_tensors=\"pt\").input_ids\n\n# Generate summary\noutput_ids = model.generate(input_ids, max_new_tokens=50)\n\n# Decode and print the summary\nsummary_text = tokenizer.decode(output_ids[0], skip_special_tokens=True)\nprint(summary_text)"], "exp 7 zero shot prompt t5 summarisation": ["# Install libraries\n!pip install transformers sentencepiece -q\n\n# Import libraries\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\n# Load FLAN-T5 model\ntokenizer = AutoTokenizer.from_pretrained(\"google/flan-t5-small\")\nmodel = AutoModelForSeq2SeqLM.from_pretrained(\"google/flan-t5-small\")\n\n# Dialogue\ndialogue = \"\"\"\nRam: Hello\nShyam: Hi\nRam: Let's go to college\n\"\"\"\n\n# Prompt\ntext = \"Summarize this conversation: \" + dialogue\n\n# Convert text into tokens\ninputs = tokenizer(text, return_tensors=\"pt\")\n\n# Generate summary\noutputs = model.generate(inputs[\"input_ids\"])\n\n# Convert output into text\nsummary = tokenizer.decode(outputs[0], skip_special_tokens=True)\n\n# Print summary\nprint(summary)"], "exp 8 few shot prompt t5 summarisation": ["# Install libraries\n!pip install transformers sentencepiece -q\n\n# Import libraries\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\n# Load FLAN-T5 model\ntokenizer = AutoTokenizer.from_pretrained(\"google/flan-t5-small\")\nmodel = AutoModelForSeq2SeqLM.from_pretrained(\"google/flan-t5-small\")\n\n# One-shot example\nexample = \"\"\"\nDialogue:\nRiya: Hi Rahul, are you coming to college tomorrow?\nRahul: Yes, we have the AI practical exam.\nRiya: Don't forget to bring the assignment.\nRahul: Thanks for reminding me.\n\nSummary:\nRiya reminds Rahul about the AI practical and assignment.\n\"\"\"\n\n# New dialogue\ndialogue = \"\"\"\nDialogue:\nAmit: Hello Sneha, did you complete the Python project?\nSneha: Yes, I finished it yesterday.\nAmit: Great! Can you help me with the final report?\nSneha: Sure, I will send you the format tonight.\n\nSummary:\n\"\"\"\n\n# Final prompt\nprompt = example + dialogue\n\n# Convert text into tokens\ninputs = tokenizer(prompt, return_tensors=\"pt\")\n\n# Generate summary\noutputs = model.generate(\n    inputs[\"input_ids\"],\n    max_length=50\n)\n\n# Convert output into text\nsummary = tokenizer.decode(\n    outputs[0],\n    skip_special_tokens=True\n)\n\n# Print summary\nprint(\"MODEL SUMMARY:\\n\")\nprint(summary)"], "exp1 transformer example": ["# Install libraries\n!pip install transformers torch\n\n# Import libraries\nfrom transformers import AutoTokenizer\nimport torch\n\n# Load tokenizer model\ntokenizer = AutoTokenizer.from_pretrained(\"distilbert-base-uncased\")\n\n# Input sentence\nsentence = \"AI helps learning\"\n\n# Convert sentence into tokens\ntokens = tokenizer.tokenize(sentence)\n\n# Print tokens\nprint(\"Tokens:\", tokens)\n\n# Convert tokens into token IDs\ntoken_ids = tokenizer.convert_tokens_to_ids(tokens)\n\n# Print token IDs\nprint(\"Token IDs:\", token_ids)\n\n# Create embedding layer\nembedding_layer = torch.nn.Embedding(30000, 8)\n\n# Convert token IDs into tensor\ninput_ids = torch.tensor([token_ids])\n\n# Generate embeddings\nembeddings = embedding_layer(input_ids)\n\n# Print embedding shape\nprint(\"Shape:\", embeddings.shape)\n\n# Print embeddings\nprint(\"Embeddings:\\n\", embeddings)"], "exp4 chatbot": ["Rule-Based Chatbot", "# Simple chatbot\n\n# Start infinite loop\nwhile True:\n\n    # Take user input\n    user = input(\"You: \")\n\n    # Convert to lowercase\n    user = user.lower()\n\n    # Rules\n    if user == \"hello\":\n        print(\"Bot: Hi!\")\n\n    elif user == \"how are you\":\n        print(\"Bot: I am fine!\")\n\n    elif user == \"bye\":\n        print(\"Bot: Goodbye!\")\n        break\n\n    else:\n        print(\"Bot: I don't understand.\")", "Hugging Face AI Chatbot", "# Install libraries\n!pip install transformers torch\n\n# Import pipeline\nfrom transformers import pipeline\n\n# Load chatbot model\nchatbot = pipeline(\"text-generation\", model=\"microsoft/DialoGPT-small\")\n\n# User message\ntext = \"Hello\"\n\n# Generate reply\nresult = chatbot(text)\n\n# Print response\nprint(result)", "Ollama Chatbot", "!pip install ollama\nimport ollama\n\nresponse = ollama.chat(\n    model='llama3',\n    messages=[\n        {'role': 'user', 'content': 'Hello'}\n    ]\n)\n\nprint(response['message']['content'])", "Text Summarization using bart", "from transformers import AutoTokenizer, AutoModelForSeq2SeqLM\nimport torch\n# Load the tokenizer and model directly for summarization\nmodel_name = \"facebook/bart-large-cnn\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\nmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name)\n# Move to GPU if available\ndevice = \"cuda\" if torch.cuda.is_available() else \"cpu\"\nmodel.to(device)\ntext = \"\"\"\nThe Internet of Things (IoT) describes the network of physical objects\u2014\"things\"\u2014\nthat are\nembedded with sensors, software, and other technologies for the purpose of\nconnecting and\nexchanging data with other devices and systems over the internet. These devices\nrange from\nordinary household objects to sophisticated industrial tools. With more than 7\nbillion\nconnected IoT devices today, experts are expecting this number to grow to 10\nbillion by\n2020 and 22 billion by 2025. Oracle has a network of device partners.\n\"\"\"\n# Encode the input text\ninputs = tokenizer([text], max_length=1024, return_tensors='pt',\ntruncation=True).to(device)\n# Generate summary\nsummary_ids = model.generate(\ninputs['input_ids'],\nmax_length=50, # Set max_length for the generated summary\nmin_length=20,\ndo_sample=False,\nnum_beams=4, # Use beam search for better quality\nrepetition_penalty=2.5,\nlength_penalty=1.0\n)\nsummary = tokenizer.decode(summary_ids[0], skip_special_tokens=True,\nclean_up_tokenization_spaces=True)\nprint(summary)"], "exp5 langchain groq translation": ["# Install libraries\n!pip install langchain langchain-groq\n\n# Import libraries\nimport os\nfrom langchain_groq import ChatGroq\n\n# Hardcoded API key\nos.environ[\"GROQ_API_KEY\"] = \"groq-\"\n\n# Load Llama 3 model\nllm = ChatGroq(\n    model=\"llama-3.3-70b-versatile\"\n)\n\n# English text\ntext = \"Hello, how are you?\"\n\n# Translate into French\nresponse = llm.invoke(\n    \"Translate this into French: \" + text\n)\n\nprint(response.content)"]};

    // Utility: escape HTML
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');

    const container = document.getElementById('container');

    // Render tiles
    Object.entries(NOTEBOOKS).forEach(([name,cells]) => {
      const tile = document.createElement('section');
      tile.className = 'tile';

      const head = document.createElement('div');
      head.className = 'tile-head';
      head.innerHTML = `<div class="tile-title">${esc(name)}</div>`;

      const actions = document.createElement('div');
      actions.className = 'tile-actions';

      const copyFileBtn = document.createElement('button');
      copyFileBtn.className = 'btn small';
      copyFileBtn.type = 'button';
      copyFileBtn.textContent = 'COPY FILE';
      copyFileBtn.setAttribute('aria-label','Copy entire file');
      actions.appendChild(copyFileBtn);

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'btn small';
      toggleBtn.type = 'button';
      toggleBtn.textContent = 'VIEW';
      actions.appendChild(toggleBtn);

      head.appendChild(actions);
      tile.appendChild(head);

      const body = document.createElement('div');
      body.className = 'tile-body';

      // add cells
      cells.forEach((code, idx) => {
        const cell = document.createElement('article');
        cell.className = 'cell';
        cell.setAttribute('data-cell-index', idx);
        cell.innerHTML = `
          <div class="cell-head"><span>Cell #${idx+1}</span><button class="btn small" data-copy-cell>Copy</button></div>
          <pre class="cell-pre"><code>${esc(code)}</code></pre>
        `;
        body.appendChild(cell);
      });

      tile.appendChild(body);
      container.appendChild(tile);

      // Events
      toggleBtn.addEventListener('click', () => body.classList.toggle('open'));

      copyFileBtn.addEventListener('click', () => {
        // join all cells into one string
        const joined = cells.join('\n\n# --- cell boundary ---\n\n');
        copyText(joined, copyFileBtn, tile);
      });
    });

    // Delegated: copy single cell buttons
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-copy-cell]');
      if (!btn) return;
      const cell = btn.closest('.cell');
      if (!cell) return;
      const code = cell.querySelector('pre code').textContent || '';
      copyText(code, btn, cell);
    });

    // copy text with Clipboard API + fallback
    function copyText(text, triggerEl, flashTarget){
      if (!text) return;
      // try modern API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => flash(triggerEl, flashTarget));
        return;
      }
      // fallback to execCommand
      try{
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta); ta.focus(); ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) { flash(triggerEl, flashTarget); return; }
      }catch(e){}
      // final fallback: select text inside element for manual copy
      const pre = flashTarget.querySelector? flashTarget.querySelector('pre') : null;
      if (pre){ const range = document.createRange(); range.selectNodeContents(pre); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
    }

    function flash(triggerEl, targetEl){
      const badge = document.createElement('span'); badge.className='copied-badge'; badge.textContent='✓ Copied';
      // show on trigger if possible, else on tile
      (triggerEl || targetEl).appendChild(badge);
      setTimeout(()=>{ badge.remove(); },900);
    }

    // Search
    document.getElementById('search').addEventListener('input', (e)=>{
      const q = e.target.value.trim().toLowerCase();
      [...document.querySelectorAll('.tile')].forEach(tile=>{
        const text = tile.textContent.toLowerCase();
        tile.style.display = q? (text.includes(q)?'flex':'none') : 'flex';
      });
    });
  </script>
</body>
</html>
