<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Code Extractor - Quick Copy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .notebook-section {
            background: white;
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .notebook-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            user-select: none;
        }
        
        .notebook-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3a91 100%);
        }
        
        .toggle-icon {
            transition: transform 0.3s;
            font-size: 20px;
        }
        
        .notebook-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        
        .code-cells {
            padding: 20px;
        }
        
        .code-cell {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .cell-header {
            background: #e8e8e8;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #666;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }
        
        .copy-btn.copied {
            background: #4caf50;
            animation: pulse 0.5s;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        pre {
            margin: 0;
            padding: 15px;
            overflow-x: auto;
            background: #f5f5f5;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        code {
            color: #333;
        }
        
        .search-box {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .stats {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Python Code Extractor - Fast Copy for Tests</h1>
        
        <div class="stats">
            <p>Quick access to all Python code from your notebooks</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchBox" placeholder="🔍 Search code snippets...">
        </div>
        
        <div id="notebooksContainer"></div>
    </div>
    
    <script>
        const allCode = {"Exp2 Simple Responsible AI concept": ["\n#Responsible AI=Fairness+Transparency+Safety\n# Install libraries\n!pip install transformers torch\n\n# Import pipeline\nfrom transformers import pipeline\n\n# Load BERT model\nunmasker = pipeline(\"fill-mask\", model=\"bert-base-uncased\")\n\n# Test sentences\nsentences = [\n    \"The doctor said that [MASK].\",\n    \"The nurse said that [MASK].\"\n]\n\n# Check predictions\nfor s in sentences:\n\n    print(\"\\nSentence:\", s)\n\n    result = unmasker(s)\n\n    # Print top prediction\n    print(\"Prediction:\", result[0]['token_str'])\n", "Check whether AI gives equal results for different groups.", "from transformers import pipeline\n\n# Load sentiment model\nclassifier = pipeline(\"sentiment-analysis\")\n\n# Similar sentences\nsentences = [\n    \"The man is intelligent.\",\n    \"The woman is intelligent.\"\n]\n\n# Check outputs\nfor s in sentences:\n    print(s, \"->\", classifier(s))"], "exp 3 arithmetic operations using Tensorflow or PyTorch": ["# Import PyTorch\nimport torch\n\n# Create tensors\na = torch.tensor([[1, 2],\n                  [3, 4]])\n\nb = torch.tensor([[5, 6],\n                  [7, 8]])\n\nprint(\"Tensor A:\\n\", a)\nprint(\"Tensor B:\\n\", b)\nprint(\"\\nAddition:\\n\", a + b)\nprint(\"\\nSubtraction:\\n\", a - b)\nprint(\"\\nMultiplication:\\n\", a * b)\nprint(\"\\nScalar Multiplication:\\n\", a * 2)\nprint(\"\\nMatrix Multiplication:\\n\", torch.matmul(a, b))"], "exp 6 no prompt t5 summarisation": ["# Install library\n!pip install transformers\n\n# Import model components\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\n# Load FLAN-T5 model and tokenizer\nmodel_name = \"google/flan-t5-small\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\nmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name)\n\n# Dialogue\ntext = \"\"\"\nRam: Hello\nShyam: Hi\nRam: Let's go to college\n\"\"\"\n\n# Prepare input for summarization with an explicit prompt\ninput_text = \"summarize: \" + text\n\n# Tokenize the input\ninput_ids = tokenizer(input_text, return_tensors=\"pt\").input_ids\n\n# Generate summary\noutput_ids = model.generate(input_ids, max_new_tokens=50)\n\n# Decode and print the summary\nsummary_text = tokenizer.decode(output_ids[0], skip_special_tokens=True)\nprint(summary_text)"], "exp 7 zero shot prompt t5 summarisation": ["# Install libraries\n!pip install transformers sentencepiece -q\n\n# Import libraries\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\n# Load FLAN-T5 model\ntokenizer = AutoTokenizer.from_pretrained(\"google/flan-t5-small\")\nmodel = AutoModelForSeq2SeqLM.from_pretrained(\"google/flan-t5-small\")\n\n# Dialogue\ndialogue = \"\"\"\nRam: Hello\nShyam: Hi\nRam: Let's go to college\n\"\"\"\n\n# Prompt\ntext = \"Summarize this conversation: \" + dialogue\n\n# Convert text into tokens\ninputs = tokenizer(text, return_tensors=\"pt\")\n\n# Generate summary\noutputs = model.generate(inputs[\"input_ids\"])\n\n# Convert output into text\nsummary = tokenizer.decode(outputs[0], skip_special_tokens=True)\n\n# Print summary\nprint(summary)"], "exp 8 few shot prompt t5 summarisation": ["# Install libraries\n!pip install transformers sentencepiece -q\n\n# Import libraries\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\n# Load FLAN-T5 model\ntokenizer = AutoTokenizer.from_pretrained(\"google/flan-t5-small\")\nmodel = AutoModelForSeq2SeqLM.from_pretrained(\"google/flan-t5-small\")\n\n# One-shot example\nexample = \"\"\"\nDialogue:\nRiya: Hi Rahul, are you coming to college tomorrow?\nRahul: Yes, we have the AI practical exam.\nRiya: Don't forget to bring the assignment.\nRahul: Thanks for reminding me.\n\nSummary:\nRiya reminds Rahul about the AI practical and assignment.\n\"\"\"\n\n# New dialogue\ndialogue = \"\"\"\nDialogue:\nAmit: Hello Sneha, did you complete the Python project?\nSneha: Yes, I finished it yesterday.\nAmit: Great! Can you help me with the final report?\nSneha: Sure, I will send you the format tonight.\n\nSummary:\n\"\"\"\n\n# Final prompt\nprompt = example + dialogue\n\n# Convert text into tokens\ninputs = tokenizer(prompt, return_tensors=\"pt\")\n\n# Generate summary\noutputs = model.generate(\n    inputs[\"input_ids\"],\n    max_length=50\n)\n\n# Convert output into text\nsummary = tokenizer.decode(\n    outputs[0],\n    skip_special_tokens=True\n)\n\n# Print summary\nprint(\"MODEL SUMMARY:\\n\")\nprint(summary)"], "exp1 transformer example": ["# Install libraries\n!pip install transformers torch\n\n# Import libraries\nfrom transformers import AutoTokenizer\nimport torch\n\n# Load tokenizer model\ntokenizer = AutoTokenizer.from_pretrained(\"distilbert-base-uncased\")\n\n# Input sentence\nsentence = \"AI helps learning\"\n\n# Convert sentence into tokens\ntokens = tokenizer.tokenize(sentence)\n\n# Print tokens\nprint(\"Tokens:\", tokens)\n\n# Convert tokens into token IDs\ntoken_ids = tokenizer.convert_tokens_to_ids(tokens)\n\n# Print token IDs\nprint(\"Token IDs:\", token_ids)\n\n# Create embedding layer\nembedding_layer = torch.nn.Embedding(30000, 8)\n\n# Convert token IDs into tensor\ninput_ids = torch.tensor([token_ids])\n\n# Generate embeddings\nembeddings = embedding_layer(input_ids)\n\n# Print embedding shape\nprint(\"Shape:\", embeddings.shape)\n\n# Print embeddings\nprint(\"Embeddings:\\n\", embeddings)"], "exp4 chatbot": ["Rule-Based Chatbot", "# Simple chatbot\n\n# Start infinite loop\nwhile True:\n\n    # Take user input\n    user = input(\"You: \")\n\n    # Convert to lowercase\n    user = user.lower()\n\n    # Rules\n    if user == \"hello\":\n        print(\"Bot: Hi!\")\n\n    elif user == \"how are you\":\n        print(\"Bot: I am fine!\")\n\n    elif user == \"bye\":\n        print(\"Bot: Goodbye!\")\n        break\n\n    else:\n        print(\"Bot: I don't understand.\")", "Hugging Face AI Chatbot", "# Install libraries\n!pip install transformers torch\n\n# Import pipeline\nfrom transformers import pipeline\n\n# Load chatbot model\nchatbot = pipeline(\"text-generation\", model=\"microsoft/DialoGPT-small\")\n\n# User message\ntext = \"Hello\"\n\n# Generate reply\nresult = chatbot(text)\n\n# Print response\nprint(result)", "Ollama Chatbot", "!pip install ollama\nimport ollama\n\nresponse = ollama.chat(\n    model='llama3',\n    messages=[\n        {'role': 'user', 'content': 'Hello'}\n    ]\n)\n\nprint(response['message']['content'])", "Text Summarization using bart", "from transformers import AutoTokenizer, AutoModelForSeq2SeqLM\nimport torch\n# Load the tokenizer and model directly for summarization\nmodel_name = \"facebook/bart-large-cnn\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\nmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name)\n# Move to GPU if available\ndevice = \"cuda\" if torch.cuda.is_available() else \"cpu\"\nmodel.to(device)\ntext = \"\"\"\nThe Internet of Things (IoT) describes the network of physical objects\u2014\"things\"\u2014\nthat are\nembedded with sensors, software, and other technologies for the purpose of\nconnecting and\nexchanging data with other devices and systems over the internet. These devices\nrange from\nordinary household objects to sophisticated industrial tools. With more than 7\nbillion\nconnected IoT devices today, experts are expecting this number to grow to 10\nbillion by\n2020 and 22 billion by 2025. Oracle has a network of device partners.\n\"\"\"\n# Encode the input text\ninputs = tokenizer([text], max_length=1024, return_tensors='pt',\ntruncation=True).to(device)\n# Generate summary\nsummary_ids = model.generate(\ninputs['input_ids'],\nmax_length=50, # Set max_length for the generated summary\nmin_length=20,\ndo_sample=False,\nnum_beams=4, # Use beam search for better quality\nrepetition_penalty=2.5,\nlength_penalty=1.0\n)\nsummary = tokenizer.decode(summary_ids[0], skip_special_tokens=True,\nclean_up_tokenization_spaces=True)\nprint(summary)"], "exp5 langchain groq translation": ["# Install libraries\n!pip install langchain langchain-groq\n\n# Import libraries\nimport os\nfrom langchain_groq import ChatGroq\n\n# Hardcoded API key\nos.environ[\"GROQ_API_KEY\"] = \"your-groq-api-key-here\"\n\n# Load Llama 3 model\nllm = ChatGroq(\n    model=\"llama-3.3-70b-versatile\"\n)\n\n# English text\ntext = \"Hello, how are you?\"\n\n# Translate into French\nresponse = llm.invoke(\n    \"Translate this into French: \" + text\n)\n\nprint(response.content)"]};
        
        function createNotebookHTML(notebookName, codeCells) {
            let cellsHTML = '';
            codeCells.forEach((code, index) => {
                cellsHTML += `
                    <div class="code-cell search-item" data-content="${escapeHtml(code.toLowerCase())}">
                        <div class="cell-header">
                            <span>Code Cell #${index + 1}</span>
                            <button class="copy-btn" onclick="copyCode(this, '${escapeHtml(code).replace(/'/g, "\'")}')">
                                📋 Copy
                            </button>
                        </div>
                        <pre><code>${escapeHtml(code)}</code></pre>
                    </div>
                `;
            });
            
            return `
                <div class="notebook-section">
                    <div class="notebook-header" onclick="toggleNotebook(this)">
                        <span>📓 ${notebookName}</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="code-cells">
                        ${cellsHTML}
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function toggleNotebook(header) {
            const cellsDiv = header.nextElementSibling;
            header.classList.toggle('collapsed');
            cellsDiv.classList.toggle('hidden');
        }
        
        function copyCode(button, code) {
            // Decode the escaped HTML
            const textarea = document.createElement('textarea');
            textarea.innerHTML = code;
            const decodedCode = textarea.value;
            
            navigator.clipboard.writeText(decodedCode).then(() => {
                const originalText = button.textContent;
                button.textContent = '✅ Copied!';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                alert('Failed to copy. Please try manually selecting and copying.');
            });
        }
        
        function initSearch() {
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('keyup', (e) => {
                const query = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.search-item');
                
                items.forEach(item => {
                    const content = item.dataset.content;
                    if (query === '' || content.includes(query)) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        }
        
        // Render all notebooks
        const container = document.getElementById('notebooksContainer');
        Object.entries(allCode).forEach(([notebookName, codeCells]) => {
            container.innerHTML += createNotebookHTML(notebookName, codeCells);
        });
        
        initSearch();
    </script>
</body>
</html>
